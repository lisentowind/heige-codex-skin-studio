<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Miku Theme Preview</title>
    <style>
      :root {
        color-scheme: light;
        --cyan: #19c7d3;
        --cyan-deep: #0799b7;
        --pink: #f58bd8;
        --violet: #b59af7;
        --ice: #eafaff;
        --ink: #123f68;
        --muted: #55769a;
        --line: rgb(95 184 239 / 0.46);
      }

      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        color: var(--ink);
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at 78% 8%, rgb(181 154 247 / 0.24), transparent 30%),
          radial-gradient(circle at 16% 92%, rgb(25 199 211 / 0.2), transparent 31%),
          linear-gradient(135deg, #f6fcff 0%, #e8f9ff 52%, #f8efff 100%);
      }

      body { padding: 18px; }

      .app {
        width: min(1500px, calc(100vw - 36px));
        height: min(900px, calc(100vh - 36px));
        min-height: 720px;
        margin: auto;
        display: grid;
        grid-template-columns: 276px 1fr;
        overflow: hidden;
        border: 1px solid rgb(93 172 238 / 0.66);
        border-radius: 28px;
        background: rgb(248 253 255 / 0.72);
        box-shadow: 0 24px 70px rgb(44 123 184 / 0.2), 0 0 0 2px rgb(255 255 255 / 0.7) inset;
      }

      aside {
        padding: 30px 18px 20px;
        background: linear-gradient(180deg, rgb(242 252 255 / 0.97), rgb(224 248 255 / 0.91));
        border-right: 1px solid var(--line);
      }

      .brand {
        padding: 0 12px 22px;
        display: flex;
        align-items: center;
        gap: 11px;
        font-weight: 750;
        font-size: 20px;
        letter-spacing: -0.02em;
      }

      .brand-mark {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 13px;
        color: white;
        background: linear-gradient(135deg, var(--cyan), #5ba5f8 56%, var(--pink));
        box-shadow: 0 8px 22px rgb(25 199 211 / 0.26);
      }

      .new-task,
      .nav-item,
      .task-item {
        display: flex;
        align-items: center;
        gap: 10px;
        border-radius: 13px;
      }

      .new-task {
        padding: 12px 14px;
        color: #075a7b;
        font-weight: 650;
        border: 1px solid rgb(65 180 225 / 0.38);
        background: linear-gradient(90deg, rgb(255 255 255 / 0.72), rgb(207 244 255 / 0.72));
      }

      .nav { margin-top: 16px; }
      .nav-item { padding: 10px 13px; color: #315f86; font-size: 14px; }
      .nav-item.active { color: #056f8a; background: rgb(25 199 211 / 0.11); }

      .section-label {
        margin: 22px 12px 10px;
        color: #5590b0;
        font-size: 11px;
        font-weight: 750;
        letter-spacing: 0.14em;
      }

      .task-item { padding: 9px 12px; color: #416c91; font-size: 13px; }
      .task-item.selected { color: #154f75; background: rgb(255 255 255 / 0.74); box-shadow: 0 7px 18px rgb(44 135 185 / 0.08); }
      .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 0 4px rgb(25 199 211 / 0.1); }

      main { min-width: 0; display: grid; grid-template-rows: 72px 1fr; }

      header {
        padding: 0 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgb(95 184 239 / 0.25);
        background: rgb(255 255 255 / 0.5);
      }

      .title { font-weight: 720; font-size: 16px; }
      .status { display: flex; align-items: center; gap: 9px; color: #4b7798; font-size: 12px; }
      .status .dot { width: 6px; height: 6px; }

      .workspace {
        position: relative;
        padding: 28px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 22px;
        overflow: hidden;
      }

      .workspace::before {
        position: absolute;
        inset: 0;
        content: "";
        pointer-events: none;
        opacity: 0.32;
        background-image:
          radial-gradient(circle, white 0 1px, transparent 1.5px),
          radial-gradient(circle, rgb(92 194 235 / 0.45) 0 1px, transparent 1.5px);
        background-position: 0 0, 17px 19px;
        background-size: 34px 34px;
      }

      .hero,
      .message,
      .composer { position: relative; z-index: 1; }

      .hero {
        padding: 26px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: linear-gradient(110deg, rgb(255 255 255 / 0.91), rgb(231 251 255 / 0.88) 55%, rgb(251 235 255 / 0.84));
        box-shadow: 0 14px 38px rgb(62 149 215 / 0.13), 0 0 0 1px white inset;
      }

      .hero h1 { margin: 0 0 8px; font-size: 29px; letter-spacing: -0.04em; }
      .hero p { margin: 0; color: var(--muted); font-size: 14px; }

      .palette { display: flex; gap: 9px; }
      .swatch { width: 40px; height: 40px; border-radius: 14px; border: 2px solid rgb(255 255 255 / 0.85); box-shadow: 0 7px 18px rgb(59 136 182 / 0.13); }
      .swatch:nth-child(1) { background: var(--cyan); }
      .swatch:nth-child(2) { background: #5ba5f8; }
      .swatch:nth-child(3) { background: var(--violet); }
      .swatch:nth-child(4) { background: var(--pink); }

      .conversation { position: relative; z-index: 1; width: min(850px, 92%); margin: auto; display: grid; align-content: center; gap: 18px; }
      .message { padding: 18px 20px; border-radius: 18px; line-height: 1.7; font-size: 14px; }
      .message.user { justify-self: end; max-width: 72%; background: linear-gradient(135deg, rgb(221 249 255 / 0.94), rgb(244 235 255 / 0.94)); border: 1px solid rgb(113 190 235 / 0.36); }
      .message.ai { max-width: 84%; background: rgb(255 255 255 / 0.8); border: 1px solid rgb(95 184 239 / 0.32); box-shadow: 0 10px 28px rgb(50 132 179 / 0.08); }
      .message strong { color: #087f9e; }

      .code {
        margin-top: 13px;
        padding: 14px 16px;
        color: #dffcff;
        font-family: "SFMono-Regular", Menlo, monospace;
        font-size: 12px;
        line-height: 1.6;
        border-radius: 14px;
        border: 1px solid rgb(49 177 206 / 0.35);
        background: #102c4a;
        box-shadow: 0 9px 22px rgb(16 63 104 / 0.14);
      }

      .composer {
        width: min(900px, 94%);
        min-height: 94px;
        margin: auto;
        padding: 18px 20px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 16px;
        border: 1px solid rgb(73 180 228 / 0.48);
        border-radius: 22px;
        background: rgb(255 255 255 / 0.87);
        box-shadow: 0 14px 34px rgb(54 142 197 / 0.13), 0 0 22px rgb(245 139 216 / 0.08);
      }

      .placeholder { color: #7090b0; font-size: 14px; }
      .send { width: 44px; height: 44px; display: grid; place-items: center; color: white; font-size: 21px; border-radius: 15px; background: linear-gradient(135deg, var(--cyan), #36a7e6); box-shadow: 0 8px 18px rgb(25 199 211 / 0.25); }

      @media (max-width: 900px) {
        body { padding: 0; }
        .app { width: 100vw; height: 100vh; min-height: 680px; border: 0; border-radius: 0; grid-template-columns: 88px 1fr; }
        aside { padding-inline: 10px; }
        .brand { justify-content: center; padding-inline: 0; }
        .brand span:last-child, .new-task span, .nav-item span:last-child, .section-label, .task-item { display: none; }
        .new-task, .nav-item { justify-content: center; }
        .hero { align-items: flex-start; gap: 20px; }
        .palette { flex-wrap: wrap; justify-content: flex-end; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside>
        <div class="brand"><span class="brand-mark">✦</span><span>Codex Miku</span></div>
        <div class="new-task"><b>＋</b><span>新建任务</span></div>
        <div class="nav">
          <div class="nav-item active"><b>◉</b><span>任务</span></div>
          <div class="nav-item"><b>◇</b><span>已安排</span></div>
          <div class="nav-item"><b>⌘</b><span>技能</span></div>
          <div class="nav-item"><b>◎</b><span>站点</span></div>
        </div>
        <div class="section-label">最近任务</div>
        <div class="task-item selected"><span class="dot"></span><span>开发 Codex 主题</span></div>
        <div class="task-item"><span class="dot"></span><span>整理工作日报</span></div>
        <div class="task-item"><span class="dot"></span><span>检查前端项目</span></div>
      </aside>
      <main>
        <header>
          <div class="title">开发 Codex 主题</div>
          <div class="status"><span class="dot"></span>本地工作区已连接</div>
        </header>
        <section class="workspace">
          <div class="hero">
            <div>
              <h1>今天想构建什么？</h1>
              <p>冰蓝底色，青色主操作，粉紫只负责高光。</p>
            </div>
            <div class="palette" aria-label="主题色板">
              <span class="swatch"></span><span class="swatch"></span><span class="swatch"></span><span class="swatch"></span>
            </div>
          </div>
          <div class="conversation">
            <div class="message user">把我的 Codex 前端换成参考图的主题风格。</div>
            <div class="message ai"><strong>主题已经安装。</strong>我保留了原有信息架构，只替换色彩、材质、圆角、描边和选中态。代码区继续使用高对比深色，长时间工作不会发飘。
              <div class="code">✓ 12 tests passed<br />✓ ASAR size unchanged<br />✓ original theme backed up</div>
            </div>
          </div>
          <div class="composer">
            <div class="placeholder">给 Codex 一个新任务……</div>
            <div class="send">↑</div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
