<style>
  .icon-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
  .icon-card { cursor: pointer; border: 2px solid #d9e2f4; border-radius: 22px; padding: 18px; background: rgba(255,255,255,.82); transition: .15s ease; }
  .icon-card:hover, .icon-card.selected { border-color: #2ccbd5; box-shadow: 0 10px 30px rgba(34, 166, 184, .18); transform: translateY(-2px); }
  .icon-art { display: block; width: min(100%, 240px); margin: 0 auto 14px; aspect-ratio: 1; object-fit: cover; border-radius: 23%; box-shadow: 0 12px 28px rgba(46, 59, 105, .25); }
  .dock { margin-top: 28px; padding: 18px 22px; border-radius: 28px; background: rgba(240, 240, 246, .74); border: 1px solid rgba(255,255,255,.9); display: flex; justify-content: center; gap: 26px; backdrop-filter: blur(16px); }
  .dock-item { display: grid; justify-items: center; gap: 8px; color: #31333b; font-size: 13px; }
  .dock-icon { width: 64px; height: 64px; object-fit: cover; border-radius: 23%; box-shadow: 0 6px 14px rgba(29, 38, 76, .25); }
  .recommend { color: #008f9d; font-weight: 700; }
  @media (max-width: 760px) { .icon-grid { grid-template-columns: 1fr; } }
</style>

<h2>选择「Miku Codex」图标裁切</h2>

    <p>角色信息更完整，缩小时脸部略小。</p>
  </div>
  <div class="icon-card option" data-choice="c" onclick="toggleSelect(this)">

</div>
